<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publication — Yaqi Han</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    :root {
      --pink: #d30b76;
      --blue: #1282fe;
      --ink: #000;
      --bg: #e6e4e2;
      --ease: cubic-bezier(.4, 0, .2, 1);
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Futura, "Avenir Next", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    img[src*="figma.com/api/mcp/asset"] { display: none !important; }

    .page { width: min(100%, 1728px); margin: 0 auto; position: relative; }

    nav {
      height: 110px;
      padding: 12px 40px;
      display: flex;
      align-items: center;
      position: fixed;
      top: 0; left: 0; right: 0; width: 100%;
      z-index: 999;
      background: rgba(230, 228, 226, 0.94);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .nav-logo img { height: 85px; width: auto; display: block; }
    .nav-links { margin-left: auto; list-style: none; display: flex; gap: 44px; }
    .nav-links a {
      text-decoration: none; color: var(--ink);
      font-size: 24px; letter-spacing: 0.72px;
      transition: color .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--pink); }

    .page-content {
      padding-top: 140px;
      padding-bottom: 0;
      position: relative;
      z-index: 2;
    }

    .page-header { padding: 0 64px 56px; }
    .page-header h1 {
      font-size: 52px; font-weight: 800;
      letter-spacing: -1px; line-height: 1;
      color: var(--blue);
    }

    /* ── 3-COLUMN GRID ── */
    .works-grid {
      padding: 0 64px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 80px;
      margin-bottom: 80px;
      align-items: end;
    }

    .work-card {
      display: block;
      text-decoration: none;
      color: var(--ink);
      cursor: pointer;
    }
    .work-thumb {
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      background: #d8d6d4;
    }
    .work-thumb img {
      width: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.55s var(--ease);
    }
    .work-card:hover .work-thumb img { transform: scale(1.04); }

    .work-thumb-overlay {
      position: absolute; inset: 0;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: background .35s var(--ease);
    }
    .work-card:hover .work-thumb-overlay { background: rgba(0,0,0,.18); }
    .work-thumb-overlay span {
      font-size: 14px; letter-spacing: .1em;
      text-transform: uppercase; color: #fff;
      opacity: 0; transition: opacity .3s var(--ease);
    }
    .work-card:hover .work-thumb-overlay span { opacity: 1; }

    .work-meta { margin-top: 14px; }
    .work-title { font-size: 22px; font-weight: 400; }
    .work-tag {
      font-size: 13px; color: #888;
      font-family: 'Inter', sans-serif;
      margin-top: 4px;
    }

    /* ── PRE-FOOTER / FOOTER ── */
    .pre-footer { position: relative; z-index: 2; margin-top: 2px; padding-top: 24px; display: flex; justify-content: center; }
    .birds-row { width: min(100%, 1112px); min-height: 193px; display: flex; align-items: center; justify-content: center; }
    .home-pill {
      border: 2px solid #000; border-radius: 35px;
      padding: 16px 36px; font-size: 24px; letter-spacing: 0.72px;
      color: #000; text-decoration: none; line-height: 1;
      background: transparent; transition: background .2s, color .2s;
    }
    .home-pill:hover { background: #000; color: #fff; }

    footer {
      position: relative; z-index: 2; left: 50%; width: 100vw; transform: translateX(-50%); margin-top: 32px;
      background: var(--blue); height: 238px;
      padding: 40px 32px 30px; color: #fff;
      text-align: center; font-family: 'Inter', sans-serif;
    }
    .footer-name { font-size: 22px; margin-bottom: 5px; }
    .footer-email { font-size: 20px; margin-bottom: 22px; }
    .footer-icons { display: flex; justify-content: center; gap: 22px; margin-bottom: 30px; }
    .footer-icons img { height: 36px; width: auto; display: block; }
    .footer-copy { font-size: 20px; }
    .footer-star { position: absolute; bottom: 26px; width: 86px; height: auto; }
    .footer-star-l { left: 18px; }
    .footer-star-r { right: 18px; }

    @media (max-width: 1200px) {
      nav { height: 90px; padding: 14px 24px; }
      .nav-logo img { height: 56px; width: auto; }
      .nav-links { gap: 22px; }
      .nav-links a { font-size: 18px; }
      .page-content { padding-top: 160px; }
      .page-header, .works-grid { padding-left: 24px; padding-right: 24px; }
      .birds-row { min-height: 124px; }
      .home-pill { font-size: 18px; padding: 12px 26px; }
      footer { margin-top: 16px; height: auto; padding-bottom: 38px; }
      .footer-copy { font-size: 16px; }
      .footer-star { width: 58px; }
    }
    @media (max-width: 900px) {
      .works-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) { .nav-links { display: none; } }
  </style>
</head>
