    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {

      --ink: #000;
      --bg: #e6e4e2;
      --ease: cubic-bezier(.4, 0, .2, 1);
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Futura, "Avenir Next", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    img[src*="figma.com/api/mcp/asset"] { display: none !important; }

    .page { width: min(100%, 1728px); margin: 0 auto; position: relative; }

    nav {
      height: 110px;
      padding: 12px 40px;
      display: flex;
      align-items: center;
      position: fixed;
      top: 0; left: 0; right: 0; width: 100%;
      z-index: 999;
      background: rgba(230, 228, 226, 0.94);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }
    .nav-logo img { height: 85px; width: auto; display: block; }
    .nav-links { margin-left: auto; list-style: none; display: flex; gap: 44px; }
    .nav-links a {
      text-decoration: none;
      color: var(--ink);
      font-size: 24px;
      letter-spacing: 0.72px;
      transition: color .2s;
    }
    .nav-links a.active, .nav-links a:hover { color: var(--pink); }

    .page-content {
      padding-top: 140px;
      min-height: 80vh;
      position: relative;
      z-index: 2;
    }

    .page-header { padding: 0 64px 48px; }
    .page-header h1 {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      color: var(--blue);
    }

    .illus-grid {
      padding: 0 64px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      column-gap: 28px;
      row-gap: 28px;
      grid-auto-rows: 8px;
      align-items: start;
    }
    .work-card {
      display: block;
      text-decoration: none;
      color: var(--ink);
      cursor: pointer;
      align-self: start;
    }
    .work-thumb {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: #d8d6d4;
    }
    .work-thumb img {
      width: 100%;
      display: block;
      transition: transform .55s var(--ease);
    }
    .work-card:hover .work-thumb img { transform: scale(1.04); }
    .work-thumb-overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .35s var(--ease);
    }
    .work-card:hover .work-thumb-overlay { background: rgba(0,0,0,.18); }
    .work-thumb-overlay span {
      font-size: 14px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #fff;
      opacity: 0;
      transition: opacity .3s var(--ease);
    }
    .work-card:hover .work-thumb-overlay span { opacity: 1; }
    .work-meta { margin-top: 14px; }
    .work-title {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.25;
    }
    .work-tag {
      font-size: 13px;
      color: #888;
      font-family: 'Inter', sans-serif;
      margin-top: 4px;
      line-height: 1.4;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 1200;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 24px 60px;
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      transition: opacity .35s var(--ease), visibility .35s;
    }
    .modal-backdrop.open { opacity: 1; visibility: visible; }
    .modal {
      background: #fff;
      border-radius: 20px;
      max-width: 720px;
      width: 100%;
      padding: 48px 48px 56px;
      position: relative;
      transform: translateY(24px);
      transition: transform .35s var(--ease);
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-close {
      position: absolute;
      top: 18px;
      right: 24px;
      font-size: 30px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink);
      line-height: 1;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--pink); }
    .modal-title {
      font-size: 34px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.5px;
      margin-bottom: 8px;
    }
    .modal-tag {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #999;
      margin-bottom: 24px;
    }
    .modal-tag.has-desc {
      margin-bottom: 18px;
    }
    .modal-desc {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.8;
      color: #444;
      margin-bottom: 32px;
    }
    .modal-images {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-images img {
      width: 100%;
      display: block;
      border-radius: 10px;
      background: #f0f0f0;
    }

    .pre-footer {
      position: relative;
      z-index: 2;
      margin-top: 2px;
      padding-top: 24px;
      display: flex;
      justify-content: center;
    }
    .birds-row {
      width: min(100%, 1112px);
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home-pill {
      border: 2px solid #000;
      border-radius: 35px;
      padding: 16px 36px;
      font-size: 24px;
      letter-spacing: 0.72px;
      color: #000;
      text-decoration: none;
      line-height: 1;
      background: transparent;
      transition: background .2s, color .2s;
    }
    .home-pill:hover { background: #000; color: #fff; }

    footer {
      position: relative;

      left: 50%;
      width: 100vw;
      transform: translateX(-50%);
      margin-top: 32px;
      background: var(--blue);

    .footer-email { font-size: 20px; margin-bottom: 22px; }
    .footer-icons { display: flex; justify-content: center; gap: 22px; margin-bottom: 30px; }
    .footer-icons img { height: 36px; width: auto; display: block; }
    .footer-copy { font-size: 20px; }
    .footer-star { position: absolute; bottom: 26px; width: 86px; height: auto; }
    .footer-star-l { left: 18px; }
    .footer-star-r { right: 18px; }

      .nav-links a { font-size: 18px; }

    .nav-menu-btn {

      border: none;

      font-size: 22px;

      images: ["illustration/2022pencil skit.jpg"]
    },
    {
      id: "eva",
      title: "Rei",
      tag: "Digital Illustration",
      thumb: "illustration/2022eva.jpg",
      images: ["illustration/2022eva.jpg"]
    }
  ];

  const grid = document.getElementById("illustration-grid");
  const modalRoot = document.getElementById("modal-root");

  function createCard(work) {
    const card = document.createElement("a");
    card.className = "work-card";
    card.href = "#";
    card.addEventListener("click", (event) => {
      event.preventDefault();
      openModal(work.id);
    });

    card.innerHTML = `
      <div class="work-thumb">
        <img src="${work.thumb}" alt="${work.title}" />
        <div class="work-thumb-overlay"><span>View project →</span></div>
      </div>
      <div class="work-meta">
        <p class="work-title">${work.title}</p>
        <p class="work-tag">${work.tag || "Illustration"}</p>
      </div>
    `;

    return card;
  }

  function createModal(work) {
    const modal = document.createElement("div");
    modal.className = "modal-backdrop";
    modal.id = `modal-${work.id}`;
    modal.innerHTML = `
      <div class="modal">
        <button class="modal-close" type="button" aria-label="Close">×</button>
        <h2 class="modal-title">${work.title}</h2>
        <p class="modal-tag${work.description ? " has-desc" : ""}">${work.tag || "Illustration"}</p>
        ${work.description ? `<p class="modal-desc">${work.description}</p>` : ""}
        <div class="modal-images">
          ${work.images.map((src, index) => `<img src="${src}" alt="${work.title} ${index + 1}" />`).join("")}
        </div>
      </div>
    `;

    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal(work.id);
    });
    modal.querySelector(".modal-close").addEventListener("click", () => closeModal(work.id));

    return modal;
  }

  function openModal(id) {
    const modal = document.getElementById(`modal-${id}`);
    if (!modal) return;
    modal.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal(id) {
    const modal = document.getElementById(`modal-${id}`);
    if (!modal) return;
    modal.classList.remove("open");
    document.body.style.overflow = "";
  }

  works.forEach((work) => {
    grid.appendChild(createCard(work));
    modalRoot.appendChild(createModal(work));
  });

  function resizeGridItems() {
    const gridStyles = window.getComputedStyle(grid);
    const rowGap = parseFloat(gridStyles.getPropertyValue("row-gap"));
    const autoRow = parseFloat(gridStyles.getPropertyValue("grid-auto-rows"));
    if (!autoRow) return;

    grid.querySelectorAll(".work-card").forEach((item) => {
      const thumb = item.querySelector(".work-thumb");
      const meta = item.querySelector(".work-meta");
      const height = thumb.getBoundingClientRect().height + meta.getBoundingClientRect().height;
      const span = Math.ceil((height + rowGap) / (autoRow + rowGap));
      item.style.gridRowEnd = `span ${span}`;
    });
  }

  function bindMasonry() {
    const images = grid.querySelectorAll("img");
    images.forEach((image) => {
      if (image.complete) return;
      image.addEventListener("load", resizeGridItems, { once: true });
      image.addEventListener("error", resizeGridItems, { once: true });
    });
    resizeGridItems();
  }

  bindMasonry();
  window.addEventListener("resize", resizeGridItems);

  document.addEventListener("keydown", (event) => {
    if (event.key !== "Escape") return;
    document.querySelectorAll(".modal-backdrop.open").forEach((modal) => modal.classList.remove("open"));
    document.body.style.overflow = "";
  });
</script>

</div>
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        var m = document.getElementById('mobileMenu');
        if (m) m.classList.remove('open');
      }
    });
  </script>
</body>
